name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    name: Lint + test + sanitization guard
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: "3.11"
          cache: pip

      - name: Install package + dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Verify __version__ is importable
        run: |
          python -c "from local_brain.__version__ import __version__; print('version:', __version__); assert __version__, 'empty version'"

      - name: ruff lint (enforced)
        # Initial enforcement landed 2026-05-13. The auto-fixable backlog
        # (~912 sites) was cleaned in the same PR; ~73 remaining sites are
        # listed under [tool.ruff.lint.ignore] in pyproject.toml with a
        # site count per rule, to be un-ignored as the backlog drains.
        run: ruff check local_brain/

      - name: ruff format check (enforced)
        run: ruff format --check local_brain/

      - name: pytest (enforced)
        # Flipped from --collect-only to real run in PR T4. local_brain/
        # tests/conftest.py adds:
        #   - collect_ignore_glob for 3 broken test files whose target
        #     classes (AutonomyConfig, Gemma4Capabilities) exist only on
        #     unmerged branches. Listed inline in conftest.py with a
        #     "remove when restored" note.
        #   - HTTP / service mocks so tests don't need a live Brain or
        #     Ollama running.
        # Result: 51 passing + 9 skipped tests across 5 files run on
        # every PR — real CI signal instead of pretend-signal from
        # --collect-only.
        run: pytest local_brain/tests/

  sanitization-guard:
    name: Sanitization guard (no proprietary refs)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Scan for banned strings
        # Fails the build if any of these proprietary references reappear.
        # If a file legitimately needs to mention one of them (e.g. a
        # CHANGELOG entry explaining what was removed), add it to the
        # --exclude list below with a comment explaining why.
        run: |
          set -e
          BANNED='cathcap|realiz|codeword|acping|modivcare|ck-marketing|aplora-sales|aplora-marketing|family-law-suite|estate-planner|content-engine|aiia-legal|traction-eos|ericlovold|xcai_intelligence|xcai-intelligence|josefsberg|pingorch|ping_orchestrator|ping-orch|retains_defaultapp|DefaultApp-Direct'
          # Excluded files (false positives, historical docs, or the guard itself):
          #   - CHANGELOG.md             : documents what was removed
          #   - PULL_REQUEST_TEMPLATE.md : shows the banned list in the checklist
          #   - ci.yml                   : this file defines the banned list
          if grep -rniE "$BANNED" \
               --exclude-dir=.git \
               --exclude-dir=node_modules \
               --exclude-dir=dist \
               --exclude-dir=build \
               --exclude=CHANGELOG.md \
               --exclude=PULL_REQUEST_TEMPLATE.md \
               --exclude=ci.yml \
               --exclude=package-lock.json \
               .; then
             echo ""
             echo "::error::Sanitization guard failed — proprietary references detected."
             echo "See .github/workflows/ci.yml for the banned list and exclusion rules."
             exit 1
          fi
          echo "Sanitization guard: clean"
