<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Right Now · AIIA</title>
<style>
  :root {
    --bg: #faf9f6; --surface: #ffffff; --ink: #1a1a17; --muted: #6b6b63;
    --line: #e6e3db; --accent: #2e7867; --shadow: 0 1px 3px rgba(0,0,0,.06), 0 4px 12px rgba(0,0,0,.04);
    --p0: #c13b2a; --p1: #b7791f; --p2: #2e5a8c; --p3: #6e7c92;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #16161a; --surface: #1f1f24; --ink: #ece9e2; --muted: #9a978d;
      --line: #2c2c33; --accent: #4fb89d; --shadow: 0 1px 3px rgba(0,0,0,.4);
    }
  }
  * { box-sizing: border-box; }
  body { margin: 0; background: var(--bg); color: var(--ink);
    font: 15px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif; }
  .wrap { max-width: 900px; margin: 0 auto; padding: 32px 20px 64px; }
  header { display: flex; align-items: baseline; justify-content: space-between; gap: 12px; margin-bottom: 4px; }
  h1 { font-size: 22px; margin: 0; letter-spacing: -.01em; }
  h1 .glyph { color: var(--accent); }
  .sub { color: var(--muted); font-size: 13px; margin: 2px 0 24px; }
  button { font: inherit; cursor: pointer; border: 1px solid var(--line);
    background: var(--surface); color: var(--ink); border-radius: 8px; padding: 6px 12px; }
  button:hover { border-color: var(--accent); }
  #refresh { font-size: 13px; }
  .card { background: var(--surface); border: 1px solid var(--line); border-radius: 12px;
    padding: 16px 18px; margin-bottom: 12px; box-shadow: var(--shadow); }
  .card-top { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; flex-wrap: wrap; }
  .badge { font-size: 11px; font-weight: 700; letter-spacing: .04em; color: #fff;
    padding: 2px 8px; border-radius: 999px; }
  .p0 { background: var(--p0); } .p1 { background: var(--p1); }
  .p2 { background: var(--p2); } .p3 { background: var(--p3); }
  .product { font-size: 12px; color: var(--muted); font-weight: 600; }
  .score { font-size: 12px; color: var(--muted); margin-left: auto; }
  .title { font-size: 15px; font-weight: 600; margin: 2px 0 6px; }
  .reason { font-size: 13px; color: var(--muted); margin: 0 0 12px; }
  .actions { display: flex; gap: 8px; align-items: center; }
  .copy { color: var(--accent); border-color: var(--accent); font-size: 13px; font-weight: 600; }
  .copy.done { background: var(--accent); color: #fff; }
  details { margin-top: 10px; }
  summary { font-size: 12px; color: var(--muted); cursor: pointer; }
  pre { white-space: pre-wrap; word-break: break-word; background: var(--bg);
    border: 1px solid var(--line); border-radius: 8px; padding: 12px; font-size: 12px;
    margin: 8px 0 0; overflow-x: auto; }
  .empty { color: var(--muted); text-align: center; padding: 48px 0; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1><span class="glyph">⌬</span> Right Now</h1>
    <button id="refresh">Refresh</button>
  </header>
  <p class="sub">Top backlog items, ranked by AIIA. Pick one, copy the prompt, paste into Claude Code. Nothing runs on its own.</p>
  <div id="cards"><p class="empty">Loading…</p></div>
</div>
<script>
  const el = document.getElementById('cards');
  const esc = (s) => (s ?? '').replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
  async function load() {
    el.innerHTML = '<p class="empty">Loading…</p>';
    try {
      const r = await fetch('/api/roadmap/recommended?limit=8', { cache: 'no-store' });
      const data = await r.json();
      const cards = data.cards || [];
      if (!cards.length) { el.innerHTML = '<p class="empty">No ranked backlog items yet. Run project_pulse.</p>'; return; }
      el.innerHTML = cards.map((c, i) => {
        const p = (c.priority || 'P2').toLowerCase();
        const score = c.priority_score != null ? `score ${c.priority_score}` : '';
        return `<div class="card">
          <div class="card-top">
            <span class="badge ${p}">${esc(c.priority || 'P2')}</span>
            <span class="product">${esc(c.product || 'unassigned')}</span>
            <span class="score">${esc(score)}</span>
          </div>
          <div class="title">${esc(c.title)}</div>
          ${c.reasoning ? `<p class="reason">${esc(c.reasoning)}</p>` : ''}
          <div class="actions">
            <button class="copy" data-i="${i}">Copy prompt</button>
          </div>
          <details><summary>view prompt</summary><pre>${esc(c.prompt)}</pre></details>
        </div>`;
      }).join('');
      el.querySelectorAll('.copy').forEach(btn => {
        btn.addEventListener('click', async () => {
          const c = cards[+btn.dataset.i];
          try { await navigator.clipboard.writeText(c.prompt || ''); }
          catch { const t = document.createElement('textarea'); t.value = c.prompt || '';
            document.body.appendChild(t); t.select(); document.execCommand('copy'); t.remove(); }
          btn.textContent = 'Copied ✓'; btn.classList.add('done');
          setTimeout(() => { btn.textContent = 'Copy prompt'; btn.classList.remove('done'); }, 1600);
        });
      });
    } catch (e) {
      el.innerHTML = `<p class="empty">Failed to load: ${esc(String(e))}</p>`;
    }
  }
  document.getElementById('refresh').addEventListener('click', load);
  load();
</script>
</body>
</html>
